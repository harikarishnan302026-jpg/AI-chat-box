<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Sports Chat App</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(-45deg,#9cdefa,#03a3e2,#00c9a7);
    background-size:400% 400%;
    animation:gradientBG 15s ease infinite;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgb(255, 255, 255);
    backdrop-filter:blur(5px);
    animation:float 15s infinite linear;
}

.circle:nth-child(1){
    width:100px;
    height:100px;
    left:10%;
    top:20%;
    animation-duration:18s;
}

.circle:nth-child(2){
    width:150px;
    height:150px;
    left:80%;
    top:10%;
    animation-duration:25s;
}

.circle:nth-child(3){
    width:80px;
    height:80px;
    left:30%;
    top:75%;
    animation-duration:10s;
}

.circle:nth-child(4){
    width:120px;
    height:120px;
    left:70%;
    top:70%;
    animation-duration:16s;
}

@keyframes float{
    from{
        transform:translateY(0px) rotate(0deg);
    }

    to{
        transform:translateY(-1000px) rotate(360deg);
    }
}

.chat-container{
    width:800px;
    height:700px;
    background:rgba(0, 0, 0, 0.295);
    backdrop-filter:blur(20px);
    border:1px solid rgb(255, 255, 255);
    border-radius:30px;
    overflow:hidden;
    box-shadow:0 25px 45px rgba(0,0,0,0.3);
    display:flex;
    flex-direction:column;
    z-index:10;

}
.header{
    padding:25px;
    text-align:center;
    color:#42d8f3;
    font-size:35px;
    font-weight:bold;
    background:rgb(255, 255, 255);
    border-bottom:1px solid rgba(255,255,255,0.2);
}

.chat-box{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

.chat-box::-webkit-scrollbar{
    width:5px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#fff;
    border-radius:10px;
}

.message{
    max-width:80%;
    padding:15px;
    margin:12px 0;
    border-radius:20px;
    line-height:1.5;
    animation:fadeIn .6s ease;
    background: #fff;
}

.user{
    margin-left:auto;
    background:linear-gradient(45deg,#00c9a7,#00e4ff);
    color:#fff;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.bot{
    background:rgb(253, 234, 234);
    backdrop-filter:blur(10px);
    color:#000000;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.input-area{
    display:flex;
    gap:10px;
    padding:20px;
    background:rgba(255, 255, 255, 0.288);
}

input{
    flex:1;
    border:none;
    outline:none;
    padding:16px;
    border-radius:50px;
    background:rgba(255, 255, 255, 0.925);
    color:#000000fd;
    font-size:16px;
}

input::placeholder{ 
    color:#000000;
}

button{
    border:none;
    padding:15px 28px;
    border-radius:50px;
    background:linear-gradient(45deg,#00c9a7,#00e4ff);
    color:#fff;
    font-size:17px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 20px rgb(255, 255, 255);
}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="chat-container">

    <div class="header">
        AI Chat Box
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            👋 Hello! Ask me anything
        </div>

    </div>

    <div class="input-area">

        <input
            type="text"
            id="userInput"
            placeholder="Ask about anything ..."
            onkeypress="if(event.key==='Enter') sendMessage()"
        >

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

        const API_KEY = "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";

        const chatBox = document.getElementById("chatBox");
        const userInput = document.getElementById("userInput");

   let messages = [
    {
        role: "system",
        content: "You are a helpful AI assistant. Answer in a simple and friendly way."
    }
];
        function addMessage(text, sender) {

            const div = document.createElement("div");
            div.classList.add("message", sender);
            div.innerText = text;

            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;

            return div;
        }

        async function sendMessage() {

            const message = userInput.value.trim();

            if (message === "") return;

            addMessage(message, "user");
            userInput.value = "";

            messages.push({
                role: "user",
                content: message
            });

            const loading = addMessage("Typing...", "bot");

            try {

                const response = await fetch(
                    "https://api.groq.com/openai/v1/chat/completions",
                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json",
                            "Authorization": `Bearer ${API_KEY}`
                        },

                        body: JSON.stringify({
                            model: "llama-3.3-70b-versatile",
                            messages: messages,
                            max_tokens: 2000
                        })
                    }
                );

                const data = await response.json();

                loading.remove();

                if (!response.ok) {
                    addMessage(
                        "Error: " + (data.error?.message || "Something went wrong"),
                        "bot"
                    );
                    return;
                }

                const aiReply = data.choices[0].message.content;

                messages.push({
                    role: "assistant",
                    content: aiReply
                });

                addMessage(aiReply, "bot");

            }
            catch (error) {

                loading.remove();

                addMessage(
                    "Error: " + error.message,
                    "bot"
                );

                console.log(error);
            }
        }


</script>

</body>
</html>
